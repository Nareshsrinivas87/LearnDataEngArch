# =============================================================================
# Reusable Composite Action: Setup Python Environment
# =============================================================================
# Centralizes the repeated python setup + pip install pattern.
# IMPORTANT: actions/checkout MUST run before this action, because GitHub
# needs the repo cloned first to find this action.yml file.
#
# Usage in a workflow job:
#   steps:
#     - uses: actions/checkout@v4       ← must come first
#     - uses: ./.github/actions/setup-python-env
# =============================================================================

name: "Setup Python Environment"
description: "Install Python and pip dependencies (checkout must happen first)"

inputs:
  python-version:
    description: "Python version to install"
    required: false
    default: "3.10"

runs:
  using: "composite"
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: "pip"

    - name: Install dependencies
      shell: bash
      run: |
        python --version
        pip --version
        python -m pip install --upgrade pip
        pip install -r requirements.txt